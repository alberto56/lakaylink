  header_actions: 'Header Actions'
  primary_menu: 'Primary Menu'
  hero_slider: 'Hero Slider'
  hero_banner: 'Hero Banner'
  services_bar: 'Services Bar'
  product_offers: 'Product Offers'
  products_tabs: 'Products Tabs'
  product_banners: 'Product Banners'
  product_list: 'Product List'
  bestsellers: 'Bestsellers'
  content: 'Content'
  sidebar_first: 'Sidebar First'
  sidebar_second: 'Sidebar Second'
  footer_newsletter: 'Footer Newsletter'
  footer_customer_service: 'Footer Customer Service'
  footer_information: 'Footer Information'
