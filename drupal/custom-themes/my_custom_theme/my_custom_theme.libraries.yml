global-styling:
  css:
    theme:

      # Google Fonts
      https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap:
        { type: external }

      # Font Awesome
      https://use.fontawesome.com/releases/v5.15.4/css/all.css:
        { type: external }

      # Bootstrap Icons
      https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css:
        { type: external }

      # Custom Bootstrap css
      css/bootstrap.min.css: {}

      # Animate.css
      https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css:
        { type: external }

      # Owl Carousel CSS
      https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css:
        { type: external }

      https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css:
        { type: external }

      # https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css:
      #   type: external

      # Your theme styles
      css/style.css: {}

  js:
    # WOW.js
    https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js:
      { type: external, minified: true }

    # jQuery Easing
    https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js:
      { type: external, minified: true }

    # CounterUp
    https://cdnjs.cloudflare.com/ajax/libs/Counter-Up/1.0.0/jquery.counterup.min.js:
      { type: external, minified: true }

    # Waypoints (required by CounterUp)
    https://cdnjs.cloudflare.com/ajax/libs/waypoints/4.0.1/jquery.waypoints.min.js:
      { type: external, minified: true }

    # Lightbox2
    https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js:
      { type: external, minified: true }

    # Owl Carousel
    https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js:
      { type: external, minified: true }

    # Bootstrap JS Bundle
    https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js:
      { type: external, minified: true }

    # https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js:
    #   { type: external, minified: true }

    # Theme JS
    js/main.js: {}

  dependencies:
    - core/jquery
    - core/drupal
    - core/once
    - bootstrap_barrio/global-styling