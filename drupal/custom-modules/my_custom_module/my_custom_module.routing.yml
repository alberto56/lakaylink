my_custom_module.settings:
  path: '/admin/my-site'
  defaults:
    _form: '\Drupal\my_custom_module\Form\AdminSettingsForm'
  requirements:
    _permission: 'administer site configuration'

# Public login page used to initiate Google authentication.
# Anonymous users are redirected here by the
# ForceGoogleLoginSubscriber.
my_custom_module.custom_login:
  path: '/custom-login'
  defaults:
    _title: 'Login'
    _controller: '\Drupal\my_custom_module\Controller\LoginController::loginPage'
  requirements:
    _access: 'TRUE'

# Landing page used after authentication to determine the
# appropriate buyer destination and perform any required redirects.
my_custom_module.buyer_login_redirect:
  path: '/buyer-login-redirect'
  defaults:
    _controller: '\Drupal\my_custom_module\Controller\BuyerLoginRedirectController::landing'
  requirements:
    _access: 'TRUE'

# Route for buyers who have not yet been verified.
# Displays the buyer verification form.
my_custom_module.buyer_verification:
  path: '/account/buyer-verification'
  defaults:
    _form: '\Drupal\my_custom_module\Form\BuyerVerificationForm'
    _title: 'Buyer Verification'
  requirements:
    _role: 'unverified'

# Seller dashboard route.
# Accessible only to users with the admin role.
my_custom_module.seller_dashboard:
  path: '/seller'
  defaults:
    _controller: '\Drupal\my_custom_module\Controller\SellerDashboardController::dashboard'
    _title: 'Seller Dashboard'
  requirements:
    _role: 'admin'

# Route for generating invitation codes for a specific store.
# The {commerce_store} parameter identifies the target store.
# Accessible only to users with the admin role.
my_custom_module.generate_code:
  path: '/seller/store/{commerce_store}/generate-code'
  defaults:
    _controller: '\Drupal\my_custom_module\Controller\GenerateCodeController::generate'
    _title: 'Invitation Code'
  requirements:
    _role: 'admin'